name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install OCaml (OxCaml)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            ox: git+https://github.com/oxcaml/opam-repository.git
            default: https://opam.ocaml.org
          cache-prefix: linux-oxcaml

      - name: Install OCaml dependencies
        run: opam install dune ppx_jane base stdio --yes

      - name: Build project
        run: opam exec -- dune build

      - name: Build paint example
        run: opam exec -- dune build ./examples/paint.exe

      - name: Upload paint artifact
        uses: actions/upload-artifact@v4
        with:
          name: paint-linux
          path: _build/default/examples/paint.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install OCaml (OxCaml)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            ox: git+https://github.com/oxcaml/opam-repository.git
            default: https://opam.ocaml.org
          cache-prefix: macos-oxcaml

      - name: Install OCaml dependencies
        run: opam install dune ppx_jane base stdio --yes

      - name: Build project
        run: opam exec -- dune build

      - name: Build paint example
        run: opam exec -- dune build ./examples/paint.exe

      - name: Upload paint artifact
        uses: actions/upload-artifact@v4
        with:
          name: paint-macos
          path: _build/default/examples/paint.exe
