name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cache version: bump this to invalidate all caches (e.g., when adding new opam packages)
env:
  CACHE_VERSION: v2

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # Ensure graceful timeout before GitHub's 6-hour hard limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libx11-dev libxkbcommon-dev libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> _build/rust"
          save-always: true

      - name: Install OCaml (OxCaml)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            ox: git+https://github.com/oxcaml/opam-repository.git
            default: https://opam.ocaml.org
          dune-cache: true

      - name: Cache opam packages
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-${{ env.CACHE_VERSION }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            opam-${{ runner.os }}-${{ env.CACHE_VERSION }}-

      - name: Install OCaml dependencies
        run: opam install dune ppx_jane base stdio core core_unix yaml gg ocamlformat --yes

      - name: Build project
        run: opam exec -- dune build
        timeout-minutes: 300  # 5 hours - allows time for cache save
        continue-on-error: true

      - name: Build paint example
        run: opam exec -- dune build ./examples/paint.exe

      - name: Upload paint artifact
        uses: actions/upload-artifact@v4
        with:
          name: paint-linux
          path: _build/default/examples/paint.exe
        if: success()

  build-macos:
    runs-on: macos-latest
    needs: build-linux
    timeout-minutes: 350  # Ensure graceful timeout before GitHub's 6-hour hard limit

    # OSX builds are really expensive, only allow one at a time
    concurrency:
      group: osx-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: brew install clang-format

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> _build/rust"
          save-always: true

      - name: Install OCaml (OxCaml)
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            ox: git+https://github.com/oxcaml/opam-repository.git
            default: https://opam.ocaml.org
          dune-cache: true

      - name: Cache opam packages
        uses: actions/cache@v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-${{ env.CACHE_VERSION }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            opam-${{ runner.os }}-${{ env.CACHE_VERSION }}-

      - name: Install OCaml dependencies
        run: opam install dune ppx_jane base stdio core core_unix yaml gg ocamlformat --yes

      - name: Build project
        run: opam exec -- dune build
        timeout-minutes: 300  # 5 hours - allows time for cache save
        continue-on-error: true

      - name: Build paint example
        run: opam exec -- dune build ./examples/paint.exe

      - name: Upload paint artifact
        uses: actions/upload-artifact@v4
        with:
          name: paint-macos
          path: _build/default/examples/paint.exe
        if: success()
# Trigger CI rebuild
